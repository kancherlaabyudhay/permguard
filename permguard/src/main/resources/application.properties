# SERVER
server.port=8080

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/permguard_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Abyudhay@2004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=permguard_super_secret_key_malla_reddy_university_batch72_cse_2026_extended_for_security
app.jwt.expiration-ms=86400000

# EMAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_gmail_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# FILE UPLOAD
app.upload.dir=uploads/qr-codes
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# APP SETTINGS
app.default-password-prefix=PERM@
app.fraud.risk-threshold-medium=40.0
app.fraud.risk-threshold-high=70.0
app.fraud.risk-threshold-critical=90.0
app.qr.width=300
app.qr.height=300
app.qr.image-format=PNG

# ADMIN
app.admin.email=admin@permguard.com

# PROFILE
spring.profiles.active=dev

# LOGGING
logging.level.com.permguard=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.file.name=logs/permguard.log

# ACTUATOR
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
